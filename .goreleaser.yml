version: 2

project_name: verify-loop

before:
  hooks:
    - go mod tidy

builds:
  - id: verify-loop
    main: .
    binary: verify-loop
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: verify-loop
    builds: [verify-loop]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

changelog:
  use: git-cliff
  sort: asc

release:
  github:
    owner: agusrdz
    name: verify-loop
  draft: false
  prerelease: auto

brews:
  - name: verify-loop
    repository:
      owner: agusrdz
      name: homebrew-tap
    homepage: https://github.com/agusrdz/verify-loop
    description: "PostToolUse/Write hook for static analysis feedback in Claude Code"
    license: MIT
    install: |
      bin.install "verify-loop"
    test: |
      system "#{bin}/verify-loop", "--version"
